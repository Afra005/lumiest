<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --card-bg: #4F3425;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            overflow: hidden;
        }

        .flex-center {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; position: relative;
        }

        /* PERSIST Screen - Restored to original bold look */
        .persist-title {
            font-size: clamp(2.5rem, 18vw, 5rem);
            text-transform: uppercase;
            font-weight: bold; /* Original thickness */
            text-align: center; 
            width: 90%; 
            animation: breathe 3s ease-in-out forwards;
        }

        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* DUO STYLE INTRO (2-Page Split) */
        .duo-intro-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .lumi-bubble {
            background-color: var(--bubble-bg);
            color: var(--bubble-text);
            padding: 25px; border-radius: 25px;
            font-size: 1.2rem; font-weight: 500;
            max-width: 300px; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            animation: popIn 0.4s ease-out forwards;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .lumi-bubble::after {
            content: ''; position: absolute; bottom: -12px; left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-top: 12px solid var(--bubble-bg);
        }

        .lumi-stand {
            width: 160px; height: 160px; margin-bottom: 80px;
            display: flex; justify-content: center; align-items: center;
        }

        .lumi-stand img { width: 100%; height: 100%; object-fit: contain; }

        .duo-btn {
            background: var(--accent); color: var(--mocha-bg);
            border: none; padding: 18px;
