<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --card-bg: #4F3425;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            overflow: hidden;
        }

        .flex-center {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; position: relative;
        }

        /* 1. PERSIST SCREEN - Refined Elegant Font */
        .persist-title {
            font-size: clamp(2.2rem, 15vw, 4rem); 
            text-transform: uppercase;
            font-weight: 500; 
            text-align: center; 
            width: 90%; 
            letter-spacing: 0.1rem; 
            animation: breathe 3s ease-in-out forwards;
        }

        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* 2. DUO STYLE INTRO - Side-by-Side Layout */
        .duo-intro-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .lumi-chat-wrapper {
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 120px; 
        }

        .lumi-stand {
            width: 200px; height: 200px; /* Bigger Lumi */
            flex-shrink: 0;
            animation: slideUp 0.6s ease-out;
            margin-right: -15px; /* Slight overlap for character */
            z-index: 2;
        }
        .lumi-stand img { width: 100%; height: 100%; object-fit: contain; }

        .lumi-bubble {
            background-color: var(--bubble-bg);
            color: var(--bubble-text);
            padding: 22px; border-radius: 25px;
            font-size: 1.15rem; font-weight: 500;
            width: 200px; 
            position: relative;
            margin-bottom: 80px; /* Raised to her upper side */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            z-index: 1;
        }

        /* Bubble tail pointing LEFT to Lumi */
        .lumi-bubble::after {
            content: ''; position: absolute; 
            bottom: -12px; left: 15px; 
            width: 0; height: 0;
            border-left: 15px solid transparent; 
            border-right: 15px solid transparent;
            border-top: 15px solid var(--bubble-bg);
            transform: rotate(35deg); 
        }

        .duo-btn {
            background: var(--accent); color: var(--mocha-bg);
            border: none; padding: 18px; border-radius: 20px;
            font-weight: 800; cursor: pointer; width: 85%;
            max-width: 320px; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
            position: fixed; bottom: 40px;
            font-family: 'Segoe UI', sans-serif;
            box-shadow: 0 4px 0px #A67C52;
        }

        .duo-btn:active { transform: translateY(2px); box-shadow: none; }

        /* 3. CARDS (Name/Dream) */
        .container {
            background: var(--card-bg); padding: 40px 30px; border-radius: 40px;
            width: 85%; max-width: 350px; text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        .mascot-circle {
            width: 110px; height: 110px; background: var(--mocha-bg);
            border-radius: 50%; margin: -90px auto 20px;
            border: 4px solid var(--accent);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .mascot-circle img { width: 80%; height: 80%; }

        input {
            width: 100%; padding: 14px; margin: 20px 0;
            border-radius: 12px; border: none; background: var(--mocha-bg);
            color: white; text-align: center; font-size: 1rem;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .reset-btn { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 5px 10px; border-radius: 10px; font-size: 0.6rem; z-index: 100; cursor: pointer;}
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetJourney()">Reset</button>
    <div id="app" class="flex-center"></div>

        let state = {
            step: localStorage.getItem('lumi_step') || 'persist',

            }
