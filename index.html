<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        #app { width: 100%; height: 100%; max-width: 400px; position: relative; display: flex; flex-direction: column; }

        /* PERSIST SCREEN */
        .persist-screen {
            height: 100vh; width: 100vw; 
            display: flex; justify-content: center; align-items: center;
            background-color: var(--mocha-bg);
            position: fixed; top: 0; left: 0; z-index: 1000;
        }
        .persist-title {
            font-size: 50px; text-transform: uppercase; font-weight: 500;
            letter-spacing: 2px; margin-top: -20px;
            animation: breathe 3s ease-in-out forwards;
            font-family: 'Times New Roman', serif;
        }
        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* INTRO LAYOUT */
        .intro-container {
            flex: 1; position: relative; width: 100%;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .lumi-interaction-group {
            position: relative;
            /* MOVED BOTH UP: Increased bottom padding from 10px to 60px */
            padding: 0 20px 60px 20px; 
            display: flex;
            align-items: flex-end; 
        }

        .mascot-img { 
            width: 150px; 
            height: 150px; 
            object-fit: contain;
            z-index: 2;
            margin-left: -10px;
        }

        .lumi-bubble-right {
            background: var(--bubble-bg); color: var(--bubble-text);
            padding: 15px 22px; border-radius: 25px;
            font-weight: bold; font-size: 1.15rem;
            position: relative; 
            margin-left: -5px;
