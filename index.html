<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            /* We are keeping your custom dark Mocha color scheme */
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18; /* Darker input background */
            --text-color: #F5F5F0;
            --accent: #D4A373;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Container inspired by the minimalist layout of the second image */
        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 400px; /* Limits width for a phone feel */
            padding: 40px 20px;
            box-sizing: border-box;
            justify-content: space-between; /* Pushes content to top and bottom */
        }

        /* Top Text Area - inspired by the layout of the second image */
        .top-content {
            width: 100%;
            text-align: left;
            padding-left: 10px;
        }

        .main-greeting {
            font-size: 32px;
            font-weight: bold;
            color: var(--text-color);
            margin: 0 0 10px 0;
        }

        .sub-greeting {
            font-size: 18px;
            opacity: 0.9;
            margin: 0 0 40px 0;
            font-family: 'Arial', sans-serif; /* Modern sans-serif for sub-text */
        }

        /* Input area styled with a modern minimal look and your color */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            padding-right: 100px; /* Space for the clear and arrow icons */
            border-radius: 16px;
            border: none;
            background-color: var(--mocha-darker);
            color: var(--text-color);
            font-size: 24px; /* Large input text like the second image */
            font-weight: bold;
            font-family: 'Arial', sans-serif;
            text-align: left;
            box-sizing: border-box;
        }

        input::placeholder {
            color: rgba(245, 245, 240, 0.4);
            font-size: 18px;
            font-weight: normal;
        }

        /* Clear button (X) and Continue button (->) layout */
        .input-actions {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
