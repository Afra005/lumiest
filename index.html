<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --card-bg: #4F3425;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            overflow: hidden;
        }

        .flex-center {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; position: relative;
        }

        /* FIXED PERSIST FONT */
        .persist-title {
            font-size: 50px;
            text-transform: uppercase;
            font-weight: 500;
            text-align: center;
            width: 100%;
            letter-spacing: 2px;
            animation: breathe 3s ease-in-out forwards;
        }

        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* SIDE BY SIDE LAYOUT */
        .duo-intro-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .lumi-chat-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 120px;
        }

        .lumi-stand {
            width: 180px; height: 180px;
            flex-shrink: 0;
            z-index: 2;
        }
        .lumi-stand img { width: 100%; height: 100%; object-fit: contain; }

        .lumi-bubble {
            background-color: var(--bubble-bg);
            color: var(--bubble-text);
            padding: 20px; border-radius: 25px;
            font-size: 1.1rem; font-weight: 500;
            width: 180px;
            position: relative;
            margin-left: -10px;
            margin-bottom: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 0.5s ease-out forwards;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            z-index: 1;
        }

        .lumi-bubble::after {
            content: ''; position: absolute;
            bottom: -10px; left: 15px;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid var(--bubble-bg);
            transform: rotate(30deg);
        }

        .duo-btn {
            background: var(--accent); color: var(--mocha-bg);
            border: none; padding: 18px; border-radius: 20px;
            font-weight: 800; cursor: pointer; width: 85%;
            max-width: 320px; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
            position: fixed; bottom: 40px;
            font-family: 'Segoe UI', sans-serif;
            box-shadow: 0 4px 0px #A67C52;
        }

        .container {
            background: var(--card-bg); padding: 40px 30px; border-radius: 40px;
            width: 85%; max-width: 350px; text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        .mascot-circle {
            width: 110px; height: 110px; background: var(--mocha-bg);
            border-radius: 50%; margin: -90px auto 20px;
            border: 4px solid var(--accent);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .mascot-circle img { width: 80%; height: 80%; }

        input {
            width: 100%; padding: 14px; margin: 20px 0;
            border-radius: 12px; border: none; background: var(--mocha-bg);
            color: white; text-align: center; font-size: 1rem;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .reset-btn { position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 5px 10px; border-radius: 10px; font-size: 0.6rem; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetJourney()">Reset</button>
    <div id="app" class="flex-center"></div>

    <script>
        // Use a standard object structure
        let state = {
            step: localStorage.getItem('lumi_step') || 'persist',
            name: localStorage.getItem('lumi_name') || '',
            dream: localStorage.getItem('lumi_dream') || ''
        };

        function updateStep(s) {
            state.step = s;
            localStorage.setItem('lumi_step', s);
            render();
        }

        function saveName() {
            const v = document.getElementById('nameIn').value;
            if (v.trim()) {
                state.name = v;
                localStorage.setItem('lumi_name', v);
                updateStep('dream');
            }
        }

        function saveDream() {
            const v = document.getElementById('dreamIn').value;
            if (v.trim()) {
                state.dream = v;
                localStorage.setItem('lumi_dream', v);
                updateStep('sanctuary');
            }
        }

        function resetJourney() {
            localStorage.clear();
            location.reload();
        }

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = ''; // Clear current view

            if (state.step === 'persist') {
                app.innerHTML = `<h1 class="persist-title">PERSIST</h1>`;
                setTimeout(() => { if(state.step === 'persist') updateStep('intro1'); }, 3000);
            } 
            else if (state.step === 'intro1') {
                app.innerHTML = `
                    <div class="duo-intro-container">
                        <div class="lumi-chat-wrapper">
                            <div class="lumi-stand"><img src="waving.png" onerror="this.src='default.png'"></div>
                            <div class="lumi-bubble">Hey, I'm Lumi!</div>
                        </div>
                        <button class="duo-btn" onclick="updateStep('intro2')">Continue</button>
                    </div>`;
            } 
            else if (state.step === 'intro2') {
                app.innerHTML = `
                    <div class="duo-intro-container">
                        <div class="lumi-chat-wrapper">
                            <div class="lumi-stand"><img src="default.png"></div>
                            <div class="lumi-bubble">I'm here to help you focus. Since you think it's yours, it's yours.</div>
                        </div>
                        <button class="duo-btn" onclick="updateStep('name')">Continue</button>
                    </div>`;
            } 
            else if (state.step === 'name') {
                app.innerHTML = `
                    <div class="container">
                        <div class="mascot-circle"><img src="default.png"></div>
                        <h2 style="font-family:'Times New Roman'">Assalamu Alaikum!</h2>
                        <p>What should I call you?</p>
                        <input type="text" id="nameIn" placeholder="Your name..." autocomplete="off">
                        <button class="duo-btn" style="position:static; width:100%" onclick="saveName()">Continue</button>
                    </div>`;
            } 
            else if (state.step === 'dream') {
                app.innerHTML = `
                    <div class="container">
                        <div class="mascot-circle"><img src="typing.png"></div>
                        <h2 style="font-family:'Times New Roman'">Welcome, ${state.name}.</h2>
                        <p>What is already yours?</p>
                        <input type="text" id="dreamIn" placeholder="e.g. Marrying Alif" autocomplete="off">
                        <button class="duo-btn" style="position:static; width:100%" onclick="saveDream()">It's Mine</button>
                    </div>`;
            } 
            else {
                app.innerHTML = `
                    <div class="container">
                        <div class="mascot-circle"><img src="success.png"></div>
                        <h2 style="font-family:'Times New Roman'">It is yours.</h2>
                        <p style="font-size: 1.4rem; color: var(--accent); font-style: italic;">"${state.dream}"</p>
                        <hr style="opacity: 0.1; margin: 20px 0;">
                        <p style="font-size: 0.85rem; opacity: 0.8;">Don't focus on it not happening.<br>Focus only on it <b>happening</b>.</p>
                    </div>`;
            }
        }

        render();
    </script>
</body>
</html>
