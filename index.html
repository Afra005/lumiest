<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --card-bg: #4F3425;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* FIXED PERSIST FONT */
        .persist-title {
            font-size: 50px; text-transform: uppercase; font-weight: 500;
            text-align: center; width: 100%; letter-spacing: 2px;
            animation: breathe 3s ease-in-out forwards;
        }

        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* LUMI LAYOUT */
        .duo-intro-container {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
            padding-bottom: 140px; box-sizing: border-box;
        }

        .lumi-chat-wrapper {
            display: flex; align-items: flex-end; justify-content: center;
            width: 100%; max-width: 500px;
        }

        .lumi-stand { 
            width: 220px; height: 220px; /* Made Lumi bigger */
            flex-shrink: 0; z-index: 2; 
            margin-right: -30px; /* Pulls bubble further left/closer */
        }
        .lumi-stand img { width: 100%; height: 100%; object-fit: contain; }

        .lumi-bubble {
            background-color: var(--bubble-bg); color: var(--bubble-text);
            padding: 20px; border-radius: 25px; font-size: 1.1rem; font-weight: 500;
            width: 170px; position: relative; 
            /* MOVED UP: Increased margin-bottom further */
            margin-bottom: 130px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center;
            font-family: 'Segoe UI', sans-serif;
            z-index: 1;
        }
