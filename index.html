<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        #app {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; max-width: 400px;
            padding: 50px 25px; box-sizing: border-box;
            justify-content: space-between;
        }

        .top-content { width: 100%; text-align: left; }
        .main-greeting { font-size: 34px; font-weight: bold; margin: 0 0 10px 0; }
        .sub-greeting { font-size: 18px; opacity: 0.8; margin: 0 0 35px 0; font-family: sans-serif; }

        .input-group { position: relative; width: 100%; }
        input {
            width: 100%; padding: 18px; padding-right: 60px;
            border-radius: 18px; border: none;
            background-color: var(--mocha-darker);
            color: var(--text-color);
            font-size: 22px; font-weight: bold;
            box-sizing: border-box; outline: none;
        }
        .btn-go {
            position: absolute; right: 8px; top: 50%;
            transform: translateY(-50%);
            background-color: #F5F5F0; border: none;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 20px; font-weight: bold;
        }

        .bottom-area {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; margin-bottom: 40px;
        }
        .mascot-circle {
            width: 130px; height: 130px; border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
        }
        .mascot-circle img { width: 80%; height: 80%; object-fit: contain; }

        .persist-screen {
            height: 100%; width: 100%; display: flex;
            justify-content: center; align-items: center;
            font-size: 40px; letter-spacing: 4px;
        }

        /* LUMI INTRO */
        .lumi-intro-screen {
            position: fixed; inset: 0;
            background-color: var(--mocha-bg);
            animation: fadeIn 0.5s ease;
        }

        /* The whole group — positioned in center of screen */
        .lumi-intro-inner {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 50px);
            max-width: 350px;
        }
