<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        #app {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; max-width: 400px;
            padding: 50px 25px; box-sizing: border-box;
            justify-content: space-between;
        }

        .q-top { width: 100%; text-align: left; }
        .q-question { font-size: 32px; font-weight: bold; margin: 0 0 10px 0; line-height: 1.2; }
        .q-sub { font-size: 16px; opacity: 0.65; margin: 0 0 40px 0; font-family: sans-serif; line-height: 1.4; }

        .name-input-row {
            display: flex; align-items: center; gap: 12px;
            border-bottom: 2px solid rgba(245, 240, 232, 0.25); padding-bottom: 10px;
        }
        .name-input-field {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-color); font-size: 32px; font-weight: bold;
            font-family: 'Times New Roman', serif; padding: 0; caret-color: var(--accent); min-width: 0;
        }
        .name-input-field::placeholder { color: rgba(245, 240, 232, 0.25); }
        .age-input-field {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-color); font-size: 32px; font-weight: bold;
            font-family: 'Times New Roman', serif; padding: 0; caret-color: var(--accent); width: 100%; min-width: 0;
        }
        .age-input-field::placeholder { color: rgba(245, 240, 232, 0.25); }
        .name-arrow-btn {
            width: 52px; height: 52px; border-radius: 50%;
            background-color: rgba(245, 240, 232, 0.12); border: none;
            color: var(--text-color); font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; flex-shrink: 0;
        }
        .name-arrow-btn:active { background-color: rgba(245, 240, 232, 0.25); }

        .identity-options { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .identity-option {
            width: 100%; padding: 18px 22px; border-radius: 16px;
            border: 2px solid rgba(212, 163, 115, 0.3);
            background: rgba(255,255,255,0.04); color: var(--text-color);
            font-size: 18px; font-weight: bold; font-family: 'Times New Roman', serif;
            cursor: pointer; text-align: left; transition: all 0.2s; box-sizing: border-box;
        }
        .identity-option:hover, .identity-option:active { background: rgba(212, 163, 115, 0.15); border-color: var(--accent); }
        .identity-option.selected { background: rgba(212, 163, 115, 0.2); border-color: var(--accent); color: var(--accent); }

        .q-next-btn {
            width: 70%; margin: 30px auto 0 auto; display: block;
            background-color: var(--accent); color: var(--mocha-darker);
            border: none; border-radius: 14px; padding: 14px 0;
            font-size: 13px; font-weight: bold; letter-spacing: 3px;
            text-transform: uppercase; cursor: pointer;
            font-family: 'Times New Roman', serif; box-shadow: 0 4px 0 #a87a50;
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
            opacity: 0.3; pointer-events: none;
        }
        .q-next-btn.active { opacity: 1; pointer-events: all; }
        .q-next-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a87a50; }

        .name-bottom {
            width: 100%; display: flex;
            justify-content: center; align-items: center; flex: 1;
        }
        .name-mascot { width: 180px; height: 180px; object-fit: contain; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.3)); }

        /* DREAM PAGE */
        .dream-page {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .dream-wrapper { position: relative; width: 100%; }

        .dream-mascot-overlap {
            width: 155px; height: 155px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            margin-bottom: -78px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .dream-card {
            background-color: var(--mocha-darker); border-radius: 24px;
            padding: 90px 24px 28px 24px;
            width: 100%; box-sizing: border-box;
            position: relative; z-index: 1;
        }
        .dream-title { font-size: 20px; font-weight: bold; font-style: italic; line-height: 1.5; text-align: center; margin: 0 0 8px 0; }
        .dream-hint { font-size: 13px; opacity: 0.55; font-family: sans-serif; text-align: center; margin: 0 0 24px 0; line-height: 1.5; }
        .dream-input-field {
            width: 100%; background: none; border: none;
            border-bottom: 1px solid rgba(245,240,232,0.2); outline: none;
            color: var(--text-color); font-size: 16px;
            font-family: 'Times New Roman', serif; font-style: italic;
            padding: 10px 0; box-sizing: border-box; caret-color: var(--accent);
        }
        .dream-input-field::placeholder { color: rgba(245,240,232,0.3); font-style: italic; }
        .dream-btn-row { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 24px; }
        .dream-continue-btn {
            width: 100%; background-color: var(--accent); color: var(--mocha-darker);
            border: none; border-radius: 14px; padding: 16px 0;
            font-size: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; font-family: 'Times New Roman', serif; box-shadow: 0 4px 0 #a87a50;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .dream-continue-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a87a50; }
        .dream-skip-btn {
            background: none; border: none; color: rgba(245,240,232,0.4);
            font-size: 13px; font-family: sans-serif; cursor: pointer;
            padding: 4px 0; text-decoration: underline;
        }

        /* SUPPORT PAGE - UPDATED GAPS */
        .support-page { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            gap: 0;
        }
        .support-mascot-circle {
            width: 110px;
            height: 110px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-shrink: 0; 
            margin-bottom: -35px; /* Reduced overlap gap */
            position: relative;
            z-index: 2;
        }
        .support-mascot-circle img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }
        .support-card {
            background-color: var(--mocha-darker); 
            border-radius: 20px;
            padding: 45px 16px 18px 16px; /* Slightly reduced top padding */
            width: 100%; 
            box-sizing: border-box;
            display: flex; 
            flex-direction: column; 
            position: relative;
            z-index: 1;
        }
        .support-title { 
            font-size: 16px; 
            font-weight: bold; 
            font-style: italic; 
            line-height: 1.4; 
            text-align: center; 
            margin: 0 0 15px 0; /* Reduced margin */
        }
        .support-options { display: flex; flex-direction: column; gap: 8px; }
        .support-option {
            width: 100%; padding: 12px 14px; border-radius: 14px;
            border: 1.5px solid rgba(212, 163, 115, 0.25);
            background: rgba(255,255,255,0.04); color: var(--text-color);
            font-family: 'Times New Roman', serif; cursor: pointer; text-align: left;
            transition: all 0.2s; box-sizing: border-box; display: flex; align-items: center; gap: 10px;
        }
        .support-option:hover, .support-option:active { background: rgba(212, 163, 115, 0.12); border-color: var(--accent); }
        .support-option.selected { background: rgba(212, 163, 115, 0.18); border-color: var(--accent); }
        .support-option-icon { font-size: 20px; flex-shrink: 0; }
        .support-option-title { font-size: 14px; font-weight: bold; margin: 0 0 2px 0; }
        .support-option-sub { font-size: 11px; opacity: 0.5; font-family: sans-serif; line-height: 1.3; margin: 0; }
        .support-next-btn {
            width: 100%; margin-top: 12px; display: block;
            background-color: var(--accent); color: var(--mocha-darker);
            border: none; border-radius: 13px; padding: 13px 0;
            font-size: 12px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; font-family: 'Times New Roman', serif; box-shadow: 0 4px 0 #a87a50;
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
            opacity: 0.3; pointer-events: none; flex-shrink: 0;
        }
        .support-next-btn.active { opacity: 1; pointer-events: all; }
        .support-next-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a87a50; }

        /* SANCTUARY */
        .sanctuary-page { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 0;
            padding-top: 30px;
        }
        .sanctuary-mascot { 
            width: 120px; 
            height: 120px; 
            object-fit: contain; 
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.3));
            margin-bottom: -40px;
            position: relative;
            z-index: 2;
        }
        .sanctuary-card { 
            background-color: var(--mocha-darker); 
            border-radius: 24px; 
            padding: 52px 28px 32px 28px; 
            width: 100%; 
            box-sizing: border-box; 
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .sanctuary-main { font-size: 22px; font-weight: bold; font-style: italic; line-height: 1.6; margin: 0 0 16px 0; }
        .sanctuary-dream { font-size: 17px; font-style: italic; color: var(--accent); line-height: 1.6; margin: 0; opacity: 0.9; }
        .sanctuary-sub { font-size: 14px; font-style: italic; color: rgba(245,240,232,0.5); font-family: sans-serif; margin: 14px 0 0 0; line-height: 1.6; }

        .persist-screen { height: 100%; width: 100%; display: flex; justify-content: center; align-items: center; font-size: 40px; letter-spacing: 4px; }

        /* LUMI INTRO */
        .lumi-intro-screen { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .lumi-intro-inner { position: relative; width: 100%; max-width: 350px; padding: 0 10px; box-sizing: border-box; }
        .lumi-center { position: relative; width: 100%; height: 220px; margin-bottom: 20px; }
        .lumi-mascot-img {
            position: absolute; bottom: 0; left: 0;
            width: 180px; height: 180px; object-fit: contain;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
        }
        .speech-bubble {
            position: absolute; bottom: 90px; left: 160px;
            background-color: #F5F0E8; border-radius: 20px;
            padding: 14px 20px; font-size: 20px;
            font-family: 'Times New Roman', serif; color: #3C2A21; font-weight: bold;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3); white-space: nowrap;
            opacity: 0; animation: bubbleIn 0.5s ease 0.3s forwards;
        }
        .speech-bubble::after { content: ''; position: absolute; left: -13px; bottom: 16px; border: 7px solid transparent; border-right-color: #F5F0E8; }
        .speech-bubble-wide {
            position: absolute; bottom: 165px; left: 10px; right: 0;
            background-color: #F5F0E8; border-radius: 20px;
            padding: 16px 18px; font-size: 15px;
            font-family: 'Times New Roman', serif; color: #3C2A21; font-weight: bold;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3); white-space: normal;
            line-height: 1.7; word-break: normal; overflow-wrap: break-word;
            opacity: 0; animation: bubbleIn 0.5s ease 0.3s forwards;
        }
        .speech-bubble-wide::after { content: ''; position: absolute; bottom: -13px; left: 60px; border: 7px solid transparent; border-top-color: #F5F0E8; }
        .lumi-continue-btn {
            width: 70%; margin: 0 auto; display: block;
            background-color: var(--accent); color: var(--mocha-darker);
            border: none; border-radius: 14px; padding: 14px 0;
            font-size: 13px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; font-family: 'Times New Roman', serif; box-shadow: 0 4px 0 #a87a50;
            transition: transform 0.1s, box-shadow 0.1s;
            opacity: 0; animation: bubbleIn 0.5s ease 0.9s forwards;
        }
        .lumi-continue-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a87a50; }

        @keyframes bubbleIn {
            0%   { opacity: 0; transform: translateY(14px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .reset-btn {
            position: fixed; bottom: 10px; left: 10px;
            background: none; border: none; color: gray;
            font-size: 10px; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>
    <button class="reset-btn" onclick="resetApp()">RESET DATA</button>
    <div id="app"></div>

    <script>
        let state = {
            name:     localStorage.getItem('lumi_name')     || '',
            age:      localStorage.getItem('lumi_age')      || '',
            identity: localStorage.getItem('lumi_identity') || '',
            dream:    localStorage.getItem('lumi_dream')    || '',
            support:  localStorage.getItem('lumi_support')  || '',
            selectedIdentity: '',
            selectedSupport: '',
            currentView: 'persist'
        };

        function getResumeView() {
            if (!state.name)     return 'lumi_intro1';
            if (!state.age)      return 'age';
            if (!state.identity) return 'identity';
            if (!state.dream)    return 'dream';
            if (!state.support)  return 'support';
            return 'sanctuary';
        }

        function resetApp() { localStorage.clear(); location.reload(); }

        function saveName() {
            const val = document.getElementById('nameInput').value;
            if (val.trim()) {
                state.name = val.trim();
                localStorage.setItem('lumi_name', state.name);
                state.currentView = 'age'; render();
            }
        }

        function saveAge() {
            const val = document.getElementById('ageInput').value;
            if (val.trim() && !isNaN(val.trim()) && parseInt(val) > 0) {
                state.age = val.trim();
                localStorage.setItem('lumi_age', state.age);
                state.currentView = 'identity'; render();
            }
        }

        function selectIdentity(option) {
            state.selectedIdentity = option;
            document.querySelectorAll('.identity-option').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('opt-' + option).classList.add('selected');
            document.getElementById('identityNextBtn').classList.add('active');
        }

        function saveIdentity() {
            if (!state.selectedIdentity) return;
            state.identity = state.selectedIdentity;
            localStorage.setItem('lumi_identity', state.identity);
            state.currentView = 'dream'; render();
        }

        function saveDream(skip) {
            const dreamValue = skip ? '' : document.getElementById('dreamInput').value.trim();
            state.dream = dreamValue;
            localStorage.setItem('lumi_dream', state.dream);
            state.currentView = 'support'; render();
        }

        function selectSupport(option) {
            state.selectedSupport = option;
            document.querySelectorAll('.support-option').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('supp-' + option).classList.add('selected');
            document.getElementById('supportNextBtn').classList.add('active');
        }

        function saveSupport() {
            if (!state.selectedSupport) return;
            state.support = state.selectedSupport;
            localStorage.setItem('lumi_support', state.support);
            state.currentView = 'sanctuary'; render();
        }

        function goToIntro2() { state.currentView = 'lumi_intro2'; render(); }
        function goToName()   { state.currentView = 'name';        render(); }

        function render() {
            const app = document.getElementById('app');

            if (state.currentView === 'persist') {
                app.innerHTML = `<div class="persist-screen">PERSIST</div>`;
                setTimeout(() => { state.currentView = getResumeView(); render(); }, 2000);
            }

            else if (state.currentView === 'lumi_intro1') {
                app.innerHTML = `
                    <div class="lumi-intro-screen">
                        <div class="lumi-intro-inner">
                            <div class="lumi-center">
                                <img class="lumi-mascot-img" src="waving.png"
                                    onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712109.png'">
                                <div class="speech-bubble">Hey, I'm Lumi!</div>
                            </div>
                            <button class="lumi-continue-btn" onclick="goToIntro2()">Continue</button>
                        </div>
                    </div>`;
            }

            else if (state.currentView === 'lumi_intro2') {
                app.innerHTML = `
                    <div class="lumi-intro-screen">
                        <div class="lumi-intro-inner">
                            <div class="lumi-center">
                                <img class="lumi-mascot-img" src="default.png"
                                    onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712109.png'">
                                <div class="speech-bubble-wide">
                                    I'm here to help you focus. Remember — if you think it's yours, then it's yours.
                                </div>
                            </div>
                            <button class="lumi-continue-btn" onclick="goToName()">Continue</button>
                        </div>
                    </div>`;
            }

            else if (state.currentView === 'name') {
                app.innerHTML = `
                    <div class="q-top">
                        <h1 class="q-question">... and who are you?</h1>
                        <p class="q-sub">Enter the name you would like to go by.</p>
                        <div class="name-input-row">
                            <input type="text" id="nameInput" class="name-input-field"
                                placeholder="Your name..." autocomplete="off"
                                autocapitalize="words" autocorrect="off">
                            <button class="name-arrow-btn" onclick="saveName()">→</button>
                        </div>
                    </div>
                    <div class="name-bottom">
                        <img class="name-mascot" src="default.png"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                    </div>`;
                setTimeout(() => {
                    const input = document.getElementById('nameInput');
                    if (input) {
                        input.focus();
                        input.addEventListener('input', () => {
                            const val = input.value;
                            if (val.length > 0) input.value = val.charAt(0).toUpperCase() + val.slice(1);
                        });
                        input.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });
                    }
                }, 50);
            }

            else if (state.currentView === 'age') {
                app.innerHTML = `
                    <div class="q-top">
                        <h1 class="q-question">... and how old are you?</h1>
                        <p class="q-sub">Just your age — nothing else.</p>
                        <div class="name-input-row">
                            <input type="number" id="ageInput" class="age-input-field"
                                placeholder="Age..." autocomplete="off" min="1" max="120">
                            <button class="name-arrow-btn" onclick="saveAge()">→</button>
                        </div>
                    </div>
                    <div class="name-bottom">
                        <img class="name-mascot" src="default.png"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                    </div>`;
                setTimeout(() => {
                    const input = document.getElementById('ageInput');
                    if (input) {
                        input.focus();
                        input.addEventListener('keydown', e => { if (e.key === 'Enter') saveAge(); });
                    }
                }, 50);
            }

            else if (state.currentView === 'identity') {
                app.innerHTML = `
                    <div class="q-top">
                        <h1 class="q-question">... and what's your identity?</h1>
                        <p class="q-sub">Choose what feels right to you.</p>
                        <div class="identity-options">
                            <button class="identity-option" id="opt-Male" onclick="selectIdentity('Male')">👦 Male</button>
                            <button class="identity-option" id="opt-Female" onclick="selectIdentity('Female')">👧 Female</button>
                            <button class="identity-option" id="opt-Prefer not to say" onclick="selectIdentity('Prefer not to say')">🤍 Prefer not to say</button>
                        </div>
                        <button class="q-next-btn" id="identityNextBtn" onclick="saveIdentity()">Continue</button>
                    </div>
                    <div class="name-bottom">
                        <img class="name-mascot" src="default.png"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                    </div>`;
            }

            else if (state.currentView === 'dream') {
                app.innerHTML = `
                    <div class="dream-page">
                        <div class="dream-wrapper">
                            <img class="dream-mascot-overlap" src="typing.png"
                                onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                            <div class="dream-card">
                                <p class="dream-title">Nice to meet you, ${state.name}.<br>What is one dream you'd like to focus on first?</p>
                                <p class="dream-hint">Tell me as if it is already yours.</p>
                                <input type="text" id="dreamInput" class="dream-input-field"
                                    placeholder="I am living in my dream home, surrounded by peace..."
                                    autocomplete="off">
                                <div class="dream-btn-row">
                                    <button class="dream-continue-btn" onclick="saveDream(false)">Continue →</button>
                                    <button class="dream-skip-btn" onclick="saveDream(true)">skip for now</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                setTimeout(() => {
                    const input = document.getElementById('dreamInput');
                    if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') saveDream(false); });
                }, 50);
            }

            else if (state.currentView === 'support') {
                app.innerHTML = `
                    <div class="support-page">
                        <div class="support-mascot-circle">
                            <img src="default.png"
                                onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                        <div class="support-card">
                            <p class="support-title">Manifesting is a journey of the heart.<br>How can I best support you today?</p>
                            <div class="support-options">
                                <button class="support-option" id="supp-consistent" onclick="selectSupport('consistent')">
                                    <span class="support-option-icon">🌿</span>
                                    <div>
                                        <p class="support-option-title">Keep me consistent</p>
                                        <p class="support-option-sub">Remind me to stay focused daily.</p>
                                    </div>
                                </button>
                                <button class="support-option" id="supp-clearly" onclick="selectSupport('clearly')">
                                    <span class="support-option-icon">✨</span>
                                    <div>
                                        <p class="support-option-title">Help me see it clearly</p>
                                        <p class="support-option-sub">Ask me questions to make my vision vivid.</p>
                                    </div>
                                </button>
                                <button class="support-option" id="supp-companion" onclick="selectSupport('companion')">
                                    <span class="support-option-icon">🤍</span>
                                    <div>
                                        <p class="support-option-title">Just be my companion</p>
                                        <p class="support-option-sub">Be a safe, non-judgmental space for me.</p>
                                    </div>
                                </button>
                            </div>
                            <button class="support-next-btn" id="supportNextBtn" onclick="saveSupport()">Continue</button>
                        </div>
                    </div>`;
            }

            else {
                const hasDream = state.dream && state.dream.trim() !== '';
                app.innerHTML = `
                    <div class="sanctuary-page">
                        <img class="sanctuary-mascot" src="success.png"
                            onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        <div class="sanctuary-card">
                            <p class="sanctuary-main">Remember, ${state.name}:<br>${hasDream ? "if you think it's yours, it's yours." : "Clarity is on its way."}</p>
                            ${hasDream ? `<p class="sanctuary-dream">"${state.dream}"</p>` : ''}
                            <p class="sanctuary-sub">Allah has already written it for you.</p>
                        </div>
                    </div>`;
            }
        }

        render();
    </script>
</body>
</html>
