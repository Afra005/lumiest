<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --card-bg: #4F3425;
            --text-color: #F5F5F0;
            --accent: #D4A373;
        }

        body {
            margin: 0;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .reset-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-family: sans-serif;
            z-index: 1000;
            opacity: 0.6;
            transition: 0.3s;
        }
        .reset-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }

        /* PERSIST Text Styling */
        .persist-title {
            font-size: 5rem;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            font-weight: 300;
            animation: breathe 3s ease-in-out forwards;
        }

        @keyframes breathe {
            0% { opacity: 0; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.02); }
        }

        /* Card Styling */
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            font-family: 'Segoe UI', sans-serif;
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mascot-circle {
            width: 110px; height: 110px;
            background: var(--mocha-bg);
            border-radius: 50%;
            margin: -90px auto 20px;
            border: 4px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .mascot-circle img { width: 85%; height: 85%; object-fit: contain; }

        input {
            width: 80%; padding: 12px; margin: 20px 0;
            border-radius: 10px; border: none;
            background: var(--mocha-bg); color: white; text-align: center;
            outline: none;
        }

        .main-btn {
            background: var(--accent); color: var(--mocha-bg);
            border: none; padding: 12px 30px; border-radius: 20px;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetJourney()">Reset Journey</button>

    <div id="app"></div>

    <script>
        let state = {
            viewingPersist: true,
            name: localStorage.getItem('lumi_name') || '',
            dream: localStorage.getItem('lumi_dream') || ''
        };

        function render() {
            const app = document.getElementById('app');

            // 1. AUTO-PERSIST SCREEN
            if (state.viewingPersist) {
                app.innerHTML = `<h1 class="persist-title">PERSIST</h1>`;
                
                // Automatically move to the next screen after 3 seconds
                setTimeout(() => {
                    state.viewingPersist = false;
                    render();
                }, 3000);
                return;
            }

            // 2. NAME SCREEN
            if (!state.name) {
                app.innerHTML = `
                    <div class="container">
                        <div class="mascot-circle"><img src="default.png"></div>
                        <h2 style="font-family: 'Times New Roman', serif;">Assalamu Alaikum!</h2>
                        <p>I am Lumi. What is your name?</p>
                        <input type="text" id="nameIn" placeholder="Your name..." autocomplete="off">
                        <br><button class="main-btn" onclick="saveName()">Continue</button>
                    </div>
                `;
            } 
            // 3. DREAM SCREEN
            else if (!state.dream) {
                app.innerHTML = `
                    <div class="container">
                        <div class="mascot-circle"><img src="typing.png"></div>
                        <h2 style="font-family: 'Times New Roman', serif;">Welcome, ${state.name}.</h2>
                        <p>What are we focusing on happening?</p>
                        <input type="text" id="dreamIn" placeholder="e.g. Marrying Alif" autocomplete="off">
                        <br><button class="main-btn" onclick="saveDream()">It's Mine</button>
                    </div>
                `;
            } 
            // 4. THE SANCTUARY
            else {
                app.innerHTML = `
                    <div class="container">
                        <div class="mascot-circle"><img src="success.png"></div>
                        <h2 style="font-family: 'Times New Roman', serif;">It is yours.</h2>
                        <p style="font-size: 1.6rem; color: var(--accent); font-style: italic;">"${state.dream}"</p>
                        <hr style="opacity: 0.1; margin: 20px 0;">
                        <p style="font-size: 0.9rem; opacity: 0.8;">
                            Don't focus on it not happening.<br>Focus only on it <b>happening</b>.
                        </p>
                    </div>
                `;
            }
        }

        function saveName() {
            const val = document.getElementById('nameIn').value;
            if (val.trim()) { state.name = val; localStorage.setItem('lumi_name', val); render(); }
        }
        function saveDream() {
            const val = document.getElementById('dreamIn').value;
            if (val.trim()) { state.dream = val; localStorage.setItem('lumi_dream', val); render(); }
        }
        function resetJourney() {
            localStorage.clear();
            location.reload();
        }

        render();
    </script>
</body>
</html>
