<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --card-bg: #4F3425;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* PERSIST ANIMATION */
        .persist-title {
            font-size: 50px; text-transform: uppercase; font-weight: 500;
            text-align: center; width: 100%; letter-spacing: 2px;
            animation: breathe 3s ease-in-out forwards;
        }
        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* LUMI INTRO LAYOUT */
        .duo-intro-container {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
            padding-bottom: 140px; box-sizing: border-box;
        }

        .lumi-chat-wrapper {
            display: flex; align-items: flex-end; justify-content: center;
            width: 95%; max-width: 500px;
        }

        .lumi-stand { 
            width: 210px; height: 210px; 
            flex-shrink: 0; z-index: 2; 
            margin-right: -45px;
            opacity: 0;
            animation: lumiAppear 0.8s ease-out forwards;
        }
        .lumi-stand img { width: 100%; height: 100%; object-fit: contain; }

        .lumi-bubble {
            background-color: var(--bubble-bg); color: var(--bubble-text);
            padding: 15px; border-radius: 22px; font-size: 1rem; font-weight: 500;
            width: 150px; position: relative; 
            margin-bottom: 140px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center;
            font-family: 'Segoe UI', sans-serif;
            z-index: 1;
            opacity: 0;
            animation: bubblePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.8s;
        }

        .lumi-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 18px;
            border-left: 12px solid transparent; border-right: 12px solid transparent;
            border-top: 12px solid var(--bubble-bg); transform: rotate(15deg);
        }

        @keyframes lumiAppear { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bubblePop { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }

        .duo-btn {
            background: var(--accent); color: var(--mocha-bg);
            border: none; padding: 18px; border-radius: 20px;
            font-weight: 800; cursor: pointer; width: 85%;
