<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --top-bg: #5D4037; /* Warmer mocha for the top half */
            --mocha-bg: #3C2A21;
            --card-bg: #F5F5F0; /* Light card for high contrast like Glow */
            --text-dark: #3C2A21;
            --accent: #D4A373;
            --btn-dark: #2B1E18;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .flex-center {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; position: relative;
        }

        /* The "Glow" Split Background Effect */
        .top-half {
            height: 45%;
            background-color: var(--top-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        .persist-title {
            font-size: clamp(2rem, 15vw, 4.5rem);
            letter-spacing: 0.8rem;
            color: #F5F5F0;
            text-transform: uppercase;
            font-weight: 300;
            animation: breathe 3s ease-in-out forwards;
        }

        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* The Card - Slide up effect */
        .bottom-card {
            height: 55%;
            background: var(--card-bg);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Mascot positioning like the photo */
        .mascot-container {
            width: 140px; height: 140px;
            margin-top: -100px;
            background: var(--card-bg);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .mascot-container img { width: 80%; height: 80%; object-fit: contain; }

        h2 { font-weight: 800; font-size: 1.8rem; margin: 20px 0 10px; color: var(--text-dark); }
        p { color: #666; line-height: 1.6; font-size: 1rem; max-width: 300px; }

        input {
            width: 100%; max-width: 300px; padding: 15px; margin: 20px 0;
            border-radius: 15px; border: 1px solid #ddd;
            background: #fff; color: var(--text-dark); text-align: center;
            font-size: 1rem; outline: none;
        }

        .main-btn {
            background: var(--btn-dark); color: #fff;
            border: none; padding: 16px 40px; border-radius: 30px;
            font-weight: bold; cursor: pointer; width: 100%;
            max-width: 300px; font-size: 1rem; margin-top: auto;
            margin-bottom: 20px;
        }

        .reset-btn {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0,0,0,0.2); border: none;
            color: white; padding: 8px 15px; border-radius: 20px;
            font-size: 0.7rem; z-index: 1000;
        }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetJourney()">Reset Journey</button>

    <div id="app" class="flex-center"></div>

    <script>
        let state = {
            step: localStorage.getItem('lumi_step') || 'persist',
            name: localStorage.getItem('lumi_name') || '',
            dream: localStorage.getItem('lumi_dream') || ''
        };

        function render() {
            const app = document.getElementById('app');

            if (state.step === 'persist') {
                app.style.backgroundColor = "var(--mocha-bg)";
                app.innerHTML = `<div class="flex-center" style="height:100vh"><h1 class="persist-title">PERSIST</h1></div>`;
                setTimeout(() => updateStep('intro'), 3000);
            } 
            else {
                let content = '';
                let mascot = 'default.png';

                if (state.step === 'intro') {
                    content = `
                        <h2>Hey, I'm Lumi!</h2>
                        <p>I'm here to help you focus on your manifestation. If you think it's yours, it's yours.</p>
                        <button class="main-btn" onclick="updateStep('name')">Let's get started</button>
                    `;
                } else if (state.step === 'name') {
                    content = `
                        <h2>Assalamu Alaikum!</h2>
                        <p>To begin our journey, what should I call you?</p>
                        <input type="text" id="nameIn" placeholder="Your name..." autocomplete="off">
                        <button class="main-btn" onclick="saveName()">Continue</button>
                    `;
                } else if (state.step === 'dream') {
                    mascot = 'typing.png';
                    content = `
                        <h2>Welcome, ${state.name}.</h2>
                        <p>What is already yours? What are we focusing on happening?</p>
                        <input type="text" id="dreamIn" placeholder="e.g. Marrying Alif" autocomplete="off">
                        <button class="main-btn" onclick="saveDream()">It's Mine</button>
                    `;
                } else {
                    mascot = 'success.png';
                    content = `
                        <h2>It is yours.</h2>
                        <p style="font-size: 1.4rem; color: var(--accent); font-weight: bold;">"${state.dream}"</p>
                        <p style="font-size: 0.9rem; margin-top: 20px;">
                            Don't focus on it not happening.<br>Focus only on it <b>happening</b>.
                        </p>
                    `;
                }

                app.innerHTML = `
                    <div class="top-half"></div>
                    <div class="bottom-card">
                        <div class="mascot-container">
                            <img src="${mascot}" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Lumi'">
                        </div>
                        ${content}
                    </div>
                `;
            }
        }

        function updateStep(newStep) {
            state.step = newStep;
            localStorage.setItem('lumi_step', newStep);
            render();
        }

        function saveName() {
            const val = document.getElementById('nameIn').value;
            if (val.trim()) { 
                state.name = val; 
                localStorage.setItem('lumi_name', val); 
                updateStep('dream');
            }
        }

        function saveDream() {
            const val = document.getElementById('dreamIn').value;
            if (val.trim()) { 
                state.dream = val; 
                localStorage.setItem('lumi_dream', val); 
                updateStep('sanctuary');
            }
        }

        function resetJourney() {
            localStorage.clear();
            location.reload();
        }

        render();
    </script>
</body>
</html>
