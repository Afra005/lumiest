<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            /* EXACT COLORS FROM YOUR IMAGE 3 DESIGN */
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Arial, sans-serif; /* Modern font match */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* PERSIST SCREEN ANIMATION */
        .persist-screen {
            height: 100vh; width: 100vw; display: flex; 
            justify-content: center; align-items: center;
            background-color: var(--mocha-bg);
            position: fixed; top: 0; left: 0; z-index: 1000;
        }
        .persist-title {
            font-size: 50px; text-transform: uppercase; font-weight: 500;
            letter-spacing: 2px; animation: breathe 3s ease-in-out forwards;
            font-family: 'Times New Roman', serif;
        }
        @keyframes breathe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* EXACT LUMI INTRO DESIGN (Image 3) */
        .lumi-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; height: 100%;
            position: relative;
        }

        .lumi-intro-top {
            display: flex; flex-direction: column; align-items: center;
            position: absolute; top: 10%; /* Specific positioning match */
            width: 100%;
        }

        .lumi-bubble {
            background: var(--bubble-bg); color: var(--bubble-text);
            padding: 20px 30px; border-radius: 40px;
            font-weight: bold; font-size: 1.2rem;
            text-align: center; position: relative; margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .lumi-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 20px;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-top: 10px solid var(--bubble-bg);
        }

        .duo-btn-image3 {
            background: var(--accent); color: var(--mocha-bg);
            border: none; padding: 20px 30px; border-radius: 20px;
            font-weight: 800; font-size: 1.1rem; width: 80%; text-transform: uppercase;
            cursor: pointer; position: relative; /* Inside the top flow */
        }

        .mascot-circle-image3 {
            width: 130px; height: 130px; border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
            position: absolute; bottom: 10%; /* Specific positioning match */
        }
        .mascot-circle-image3 img { width: 80%; height: 80%; object-fit: contain; }

        /* GENTLER STREAK LAYOUT (For Inputs) */
        .top-content { width: 100%; text-align: left; padding: 50px 25px; box-sizing: border-box; }
        .main-greeting { font-size: 34px; font-weight: bold; margin: 0 0 10px 0; }
        .sub-greeting { font-size: 18px; opacity: 0.8; margin: 0 0 35px 0; font-family: sans-serif; }
        .input-group { position: relative; width: 100%; }
        input {
            width: 100%; padding: 18px; padding-right: 60px;
            border-radius: 18px; border: none;
            background-color: var(--mocha-darker);
            color: var(--text-color); font-size: 22px; font-weight: bold;
            box-sizing: border-box; outline: none;
        }
        .btn-go {
            position: absolute; right: 8px; top: 50%;
            transform: translateY(-50%);
            background-color: #F5F5F0; border: none;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 20px; font-weight: bold;
        }
        .bottom-area { width: 100%; display: flex; justify-content: center; position: absolute; bottom: 10%; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        let state = {
            name: localStorage.getItem('lumi_name') || '',
            dream: localStorage.getItem('lumi_dream') || '',
            view: 'persist'
        };

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        function saveName() {
            const val = document.getElementById('nameInput').value;
            if (val.trim()) {
                state.name = val.trim();
                localStorage.setItem('lumi_name', state.name);
                state.view = 'dream'; 
                render();
            }
        }

        function saveDream() {
            const val = document.getElementById('dreamInput').value;
            if (val.trim()) {
                state.dream = val.trim();
                localStorage.setItem('lumi_dream', state.dream);
                state.view = 'sanctuary';
                render();
            }
        }

        function render() {
            const app = document.getElementById('app');
            let html = '';

            // 1. PERSIST SCREEN (Always first on refresh)
            if (state.view === 'persist') {
                html = `<div class="persist-screen"><h1 class="persist-title">PERSIST</h1></div>`;
                setTimeout(() => {
                    if (!state.name) {
                        state.view = 'intro1';
                    } else if (!state.dream) {
                        state.view = 'dream';
                    } else {
                        state.view = 'sanctuary';
                    }
                    render();
                }, 3000);
            }

            // 2. LUMI INTRO 1 (EXACT LAYOUT FROM IMAGE 3)
            else if (state.view === 'intro1') {
                html = `
                <div class="lumi-container">
                    <div class="lumi-intro-top">
                        <div class="lumi-bubble">Hey, I'm Lumi!</div>
                        <button class="duo-btn-image3" onclick="state.view='intro2'; render();">Continue</button>
                    </div>
                    <div class="mascot-circle-image3">
                        <img src="waving.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                    </div>
                </div>`;
            }

            // 3. LUMI INTRO 2 (EXACT LAYOUT FROM IMAGE 3)
            else if (state.view === 'intro2') {
                html = `
                <div class="lumi-container">
                    <div class="lumi-intro-top">
                        <div class="lumi-bubble" style="font-size: 1.1rem; padding: 20px 25px;">I'm here to help you focus. Since you think it's yours, it's yours.</div>
                        <button class="duo-btn-image3" onclick="state.view='name'; render();">Continue</button>
                    </div>
                    <div class="mascot-circle-image3">
                        <img src="mascot.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                    </div>
                </div>`;
            }

            // 4. NAME INPUT (Gentler Streak Layout, previously edited)
            else if (state.view === 'name') {
                html = `
                <div class="top-content">
                    <h1 class="main-greeting" style="font-family:'Times New Roman'">Assalamu Alaikum!</h1>
                    <p class="sub-greeting">What should I call you?</p>
                    <div class="input-group">
                        <input type="text" id="nameInput" placeholder="Name..." autocomplete="off">
                        <button class="btn-go" onclick="saveName()">→</button>
                    </div>
                </div>
                <div class="bottom-area">
                    <div class="mascot-circle-image3"><img src="mascot.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'"></div>
                </div>`;
            }

            // 5. DREAM INPUT (The "Next Question")
            else if (state.view === 'dream') {
                html = `
                <div class="top-content">
                    <h1 class="main-greeting" style="font-family:'Times New Roman'">Welcome, ${state.name}.</h1>
                    <p class="sub-greeting">What is already yours?</p>
                    <div class="input-group">
                        <input type="text" id="dreamInput" placeholder="e.g. Marrying Alif" autocomplete="off">
                        <button class="btn-go" onclick="saveDream()">→</button>
                    </div>
                </div>
                <div class="bottom-area">
                    <div class="mascot-circle-image3"><img src="typing.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'"></div>
                </div>`;
            }

            // 6. SANCTUARY
            else {
                html = `
                <div class="top-content">
                    <h1 class="main-greeting" style="font-style: italic; font-family:'Times New Roman'">It is yours.</h1>
                    <p class="sub-greeting" style="color: var(--accent); font-weight: bold; font-size: 24px;">"${state.dream}"</p>
                </div>
                <div class="bottom-area">
                    <div class="mascot-circle-image3" style="margin-bottom: 20px;">
                        <img src="success.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                    </div>
                    <p style="text-align: center; opacity: 0.8; font-family: sans-serif;">Focus only on it <b>happening</b>.</p>
                </div>`;
            }
            app.innerHTML = html;
        }
        render();
    </script>
</body>
</html>
