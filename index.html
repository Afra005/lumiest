<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha: #4A3C39;
            --dusty-rose: #C29992;
            --bone-white: #F5F5F0;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--mocha);
            color: var(--bone-white);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: opacity 0.5s ease-in-out;
        }

        /* The Consolidated Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 50px 30px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        /* The Mascot Viewport - This fixes the floating issue */
        .mascot-viewport {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            margin: -95px auto 25px; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--dusty-rose);
            box-shadow: 0 0 15px rgba(194, 153, 146, 0.3);
        }

        .mascot-viewport img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 { font-style: italic; font-weight: normal; font-size: 1.4rem; line-height: 1.4; margin-bottom: 25px; text-shadow: 0 0 12px rgba(245,245,240,0.4); }
        
        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--dusty-rose);
            color: var(--bone-white);
            width: 90%;
            padding: 12px;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 35px;
            transition: border-bottom 0.3s;
        }

        input:focus { border-bottom: 2px solid var(--bone-white); }

        button.main-btn {
            background: var(--dusty-rose);
            color: var(--mocha);
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.main-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .reset-btn {
            position: absolute;
            top: -70px;
            right: 0;
            background: rgba(255,255,255,0.1);
            color: var(--bone-white);
            border: none;
            font-size: 0.75rem;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-style: italic;
        }

        .fade-out { opacity: 0; }
        
        .dream-text { font-style: italic; line-height: 1.6; color: var(--bone-white); opacity: 0.9; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="app-container" class="card">
        <button class="reset-btn" onclick="resetJourney()">Reset Journey</button>
        
        <div class="mascot-viewport">
            <img id="mascot" src="default.png" alt="Lumi">
        </div>

        <div id="content">
            </div>
    </div>

    <script>
        let state = {
            name: localStorage.getItem('name') || '',
            dream: localStorage.getItem('dream') || ''
        };

        const uncertainPhrases = ["i don't know", "none", "nothing", "not sure", "i haven't decided yet", "i dont know", "no", "haven't decided"];

        function render() {
            const content = document.getElementById('content');
            const mascot = document.getElementById('mascot');

            // 1. If we don't have a name yet
            if (!state.name) {
                mascot.src = "default.png";
                content.innerHTML = `
                    <h2>Assalamu Alaikum! I am Lumi. <br>Before we start — what is your name?</h2>
                    <input type="text" id="nameInput" placeholder="Your name..." autocomplete="off">
                    <br><button class="main-btn" onclick="saveName()">Continue →</button>
                `;
            } 
            // 2. If we have a name but no dream
            else if (!state.dream) {
                mascot.src = "typing.png";
                content.innerHTML = `
                    <h2>Nice to meet you, ${state.name}. <br>What is one dream you'd like us to focus on?</h2>
                    <input type="text" id="dreamInput" placeholder="Tell me as if it is already yours..." autocomplete="off">
                    <br><button class="main-btn" onclick="saveDream()">Continue →</button>
                `;
            } 
            // 3. The Final Sanctuary Screen (Merged)
            else {
                const isUncertain = uncertainPhrases.includes(state.dream.toLowerCase().trim()) || state.dream === "";
                
                // Show Doubt cloud if they don't know, Success cloud if they do!
                mascot.src = isUncertain ? "doubt.png" : "success.png";
                
                const displayMessage = isUncertain 
                    ? "Your heart is preparing for something beautiful. <br><b>Clarity is on its way.</b>" 
                    : `"${state.dream}"`;

                content.innerHTML = `
                    <h2 style="margin-bottom: 10px;">Welcome back, ${state.name}</h2>
                    <div class="dream-text">${displayMessage}</div>
                `;
            }
        }

        function saveName() {
            const val = document.getElementById('nameInput').value;
            if (val) {
                state.name = val;
                localStorage.setItem('name', state.name);
                render();
            }
        }

        function saveDream() {
            const val = document.getElementById('dreamInput').value;
            state.dream = val; // We allow empty/unknown here for the special logic
            localStorage.setItem('dream', state.dream);
            render();
        }

        function resetJourney() {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                localStorage.clear();
                state = { name: '', dream: '' };
                render();
                document.body.classList.remove('fade-out');
            }, 500);
        }

        render();
    </script>
</body>
</html>
