<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
            --bubble-bg: #FFFFFF;
            --bubble-text: #3C2A21;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        #app {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; max-width: 400px;
            padding: 50px 25px; box-sizing: border-box;
            justify-content: space-between;
        }

        /* --- STYLING FROM PREVIOUS STEPS --- */
        .top-content { width: 100%; text-align: left; }
        .main-greeting { font-size: 34px; font-weight: bold; margin: 0 0 10px 0; }
        .sub-greeting { font-size: 18px; opacity: 0.8; margin: 0 0 35px 0; font-family: sans-serif; }

        .input-group { position: relative; width: 100%; }
        input {
            width: 100%; padding: 18px; padding-right: 60px;
            border-radius: 18px; border: none;
            background-color: var(--mocha-darker);
            color: var(--text-color);
            font-size: 22px; font-weight: bold;
            box-sizing: border-box; outline: none;
        }

        .btn-go {
            position: absolute; right: 8px; top: 50%;
            transform: translateY(-50%);
            background-color: #F5F5F0; border: none;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 20px; font-weight: bold;
        }

        /* --- LUMI CONVERSATION STYLING --- */
        .lumi-container { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; padding-bottom: 50px; }
        .lumi-bubble {
            background: var(--bubble-bg); color: var(--bubble-text);
            padding: 20px; border-radius: 25px; font-family: sans-serif;
            text-align: center; margin-bottom: 30px; position: relative; width: 80%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .lumi-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 20px;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-top: 10px solid var(--bubble-bg);
        }
        .duo-btn {
            background: var(--accent); color: var(--mocha-bg);
            border: none; padding: 20px; border-radius: 20px;
            font-weight: bold; width: 100%; text-transform: uppercase; cursor: pointer;
        }

        .bottom-area { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .mascot-circle {
            width: 130px; height: 130px; border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
        }
        .mascot-circle img { width: 80%; height: 80%; object-fit: contain; }

        .persist-screen { height: 100%; width: 100%; display: flex; justify-content: center; align-items: center; font-size: 40px; letter-spacing: 4px; }
        .reset-btn { position: fixed; bottom: 10px; left: 10px; background: none; border: none; color: gray; font-size: 10px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetApp()">RESET DATA</button>
    <div id="app"></div>

    <script>
        let state = {
            name: localStorage.getItem('lumi_name') || '',
            dream: localStorage.getItem('lumi_dream') || '',
            currentView: 'persist'
        };

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        // --- NAVIGATION LOGIC ---
        function checkOnboarding() {
            if (!state.name) {
                // If no name, go back to the very beginning of the intro
                state.currentView = 'intro1';
            } else if (!state.dream) {
                // Name exists, but no dream? Go to dream entry
                state.currentView = 'dream';
            } else {
                // Both exist, go to sanctuary
                state.currentView = 'sanctuary';
            }
            render();
        }

        function saveName() {
            const val = document.getElementById('nameInput').value;
            if (val.trim()) {
                state.name = val.trim();
                localStorage.setItem('lumi_name', state.name);
                state.currentView = 'dream'; // Move to next onboarding question
                render();
            }
        }

        function saveDream() {
            const val = document.getElementById('dreamInput').value;
            if (val.trim()) {
                state.dream = val.trim();
                localStorage.setItem('lumi_dream', state.dream);
                state.currentView = 'sanctuary';
                render();
            }
        }

        function render() {
            const app = document.getElementById('app');
            
            // 1. PERSIST (Always starts here on refresh)
            if (state.currentView === 'persist') {
                app.innerHTML = `<div class="persist-screen">PERSIST</div>`;
                setTimeout(checkOnboarding, 2000);
            }

            // 2. INTRO 1 (The Greeting)
            else if (state.currentView === 'intro1') {
                app.innerHTML = `
                <div class="lumi-container">
                    <div class="lumi-bubble">Hey, I'm Lumi!</div>
                    <div class="bottom-area">
                        <div class="mascot-circle"><img src="waving.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'"></div>
                    </div>
                    <button class="duo-btn" onclick="state.currentView='intro2'; render();">Continue</button>
                </div>`;
            }

            // 3. INTRO 2 (The Manifestation Logic)
            else if (state.currentView === 'intro2') {
                app.innerHTML = `
                <div class="lumi-container">
                    <div class="lumi-bubble">I'm here to help you focus. Since you think it's yours, it's yours.</div>
                    <div class="bottom-area">
                        <div class="mascot-circle"><img src="mascot.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'"></div>
                    </div>
                    <button class="duo-btn" onclick="state.currentView='name'; render();">Continue</button>
                </div>`;
            }

            // 4. NAME INPUT
            else if (state.currentView === 'name') {
                app.innerHTML = `
                <div class="top-content">
                    <h1 class="main-greeting">Assalamu Alaikum!</h1>
                    <p class="sub-greeting">What should I call you?</p>
                    <div class="input-group">
                        <input type="text" id="nameInput" placeholder="Name..." autocomplete="off">
                        <button class="btn-go" onclick="saveName()">→</button>
                    </div>
                </div>
                <div class="bottom-area">
                    <div class="mascot-circle"><img src="mascot.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'"></div>
                </div>`;
            }

            // 5. DREAM INPUT (The "next onboarding question")
            else if (state.currentView === 'dream') {
                app.innerHTML = `
                <div class="top-content">
                    <h1 class="main-greeting">Welcome, ${state.name}.</h1>
                    <p class="sub-greeting">What is already yours?</p>
                    <div class="input-group">
                        <input type="text" id="dreamInput" placeholder="e.g. Marrying Alif" autocomplete="off">
                        <button class="btn-go" onclick="saveDream()">→</button>
                    </div>
                </div>
                <div class="bottom-area">
                    <div class="mascot-circle"><img src="typing.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'"></div>
                </div>`;
            }

            // 6. FINAL SANCTUARY
            else {
                app.innerHTML = `
                <div class="top-content">
                    <h1 class="main-greeting" style="font-style: italic;">It is yours.</h1>
                    <p class="sub-greeting" style="color: var(--accent); font-weight: bold; font-size: 24px;">"${state.dream}"</p>
                </div>
                <div class="bottom-area">
                    <div class="mascot-circle" style="margin-bottom: 20px;">
                        <img src="success.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                    </div>
                    <p style="text-align: center; opacity: 0.8; font-family: sans-serif;">
                        Focus only on it <b>happening</b>.
                    </p>
                </div>`;
            }
        }

        render();
    </script>
</body>
</html>
