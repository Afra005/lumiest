<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        #app {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; max-width: 400px;
            padding: 50px 25px; box-sizing: border-box;
            justify-content: space-between;
        }

        .top-content { width: 100%; text-align: left; }
        .main-greeting { font-size: 34px; font-weight: bold; margin: 0 0 10px 0; }
        .sub-greeting { font-size: 18px; opacity: 0.8; margin: 0 0 35px 0; font-family: sans-serif; }

        .input-group { position: relative; width: 100%; }
        input {
            width: 100%; padding: 18px; padding-right: 60px;
            border-radius: 18px; border: none;
            background-color: var(--mocha-darker);
            color: var(--text-color);
            font-size: 22px; font-weight: bold;
            box-sizing: border-box; outline: none;
        }
        .btn-go {
            position: absolute; right: 8px; top: 50%;
            transform: translateY(-50%);
            background-color: #F5F5F0; border: none;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 20px; font-weight: bold;
        }

        .bottom-area {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; margin-bottom: 40px;
        }
        .mascot-circle {
            width: 130px; height: 130px; border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
        }
        .mascot-circle img { width: 80%; height: 80%; object-fit: contain; }

        .persist-screen {
            height: 100%; width: 100%; display: flex;
            justify-content: center; align-items: center;
            font-size: 40px; letter-spacing: 4px;
        }

        /* LUMI INTRO SHARED */
        .lumi-intro-screen {
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        .lumi-intro-inner {
            position: relative;
            width: 100%;
            max-width: 350px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .lumi-center {
            position: relative;
            width: 100%;
            height: 220px;
            margin-bottom: 20px;
        }

        .lumi-mascot-img {
            position: absolute;
            bottom: 0; left: 0;
            width: 180px; height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
            opacity: 0;
            animation:
                mascotPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards,
                lumiFloat 3s ease-in-out 0.7s infinite;
        }

        .speech-bubble {
            position: absolute;
            bottom: 90px;
            left: 160px;
            background-color: #F5F0E8;
            border-radius: 20px;
            padding: 14px 20px;
            font-size: 20px;
            font-family: 'Times New Roman', serif;
            color: #3C2A21;
            font-weight: bold;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            white-space: nowrap;
            opacity: 0;
            animation: bubbleIn 0.4s ease 0.9s forwards;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -13px; bottom: 16px;
            border: 7px solid transparent;
            border-right-color: #F5F0E8;
        }

        .speech-bubble-wide {
            position: absolute;
            bottom: 165px;
            left: 10px;
            right: 0;
            background-color: #F5F0E8;
            border-radius: 20px;
            padding: 16px 18px;
            font-size: 15px;
            font-family: 'Times New Roman', serif;
            color: #3C2A21;
            font-weight: bold;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            white-space: normal;
            line-height: 1.7;
            word-break: normal;
            overflow-wrap: break-word;
            opacity: 0;
            animation: bubbleIn 0.4s ease 0.9s forwards;
        }
        .speech-bubble-wide::after {
            content: '';
            position: absolute;
            bottom: -13px; left: 60px;
            border: 7px solid transparent;
            border-top-color: #F5F0E8;
        }

        .lumi-continue-btn {
            width: 70%;
            margin: 0 auto;
            display: block;
            background-color: var(--accent);
            color: var(--mocha-darker);
            border: none; border-radius: 14px;
            padding: 14px 0;
            font-size: 13px; font-weight: bold;
            letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer;
            font-family: 'Times New Roman', serif;
            box-shadow: 0 4px 0 #a87a50;
            transition: transform 0.1s, box-shadow 0.1s;
            opacity: 0;
            animation: bubbleIn 0.4s ease 1.4s forwards;
        }
        .lumi-continue-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #a87a50;
        }

        @keyframes mascotPop {
            0%   { opacity: 0; transform: scale(0.5) translateY(30px); }
            70%  { opacity: 1; transform: scale(1.08) translateY(-5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes bubbleIn {
            0%   { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes lumiFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-14px); }
        }

        .reset-btn {
            position: fixed; bottom: 10px; left: 10px;
            background: none; border: none; color: gray;
            font-size: 10px; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetApp()">RESET DATA</button>
    <div id="app"></div>

    <script>
        let state = {
            name:  localStorage.getItem('lumi_name')  || '',
            dream: localStorage.getItem('lumi_dream') || '',
            currentView: 'persist'
        };

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        function saveName() {
            const val = document.getElementById('nameInput').value;
            if (val.trim()) {
                state.name = val.trim();
                localStorage.setItem('lumi_name', state.name);
                state.currentView = 'dream';
                render();
            }
        }

        function saveDream() {
            const val = document.getElementById('dreamInput').value;
            if (val.trim()) {
                state.dream = val.trim();
                localStorage.setItem('lumi_dream', state.dream);
                state.currentView = 'sanctuary';
                render();
            }
        }

        function goToIntro2() {
            state.currentView = 'lumi_intro2';
            render();
        }

        function goToName() {
            state.currentView = 'name';
            render();
        }

        function render() {
            const app = document.getElementById('app');

            // PERSIST — always shows every time app opens
            if (state.currentView === 'persist') {
                app.innerHTML = `<div class="persist-screen">PERSIST</div>`;
                setTimeout(() => {
                    // After PERSIST: show intro only if name not saved, else go straight to sanctuary
                    if (!state.name) {
                        state.currentView = 'lumi_intro1';
                    } else if (!state.dream) {
                        state.currentView = 'dream';
                    } else {
                        state.currentView = 'sanctuary';
                    }
                    render();
                }, 2000);
            }

            // INTRO 1 — only for new users
            else if (state.currentView === 'lumi_intro1') {
                app.innerHTML = `
                    <div class="lumi-intro-screen">
                        <div class="lumi-intro-inner">
                            <div class="lumi-center">
                                <img class="lumi-mascot-img"
                                    src="waving.png"
                                    onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712109.png'">
                                <div class="speech-bubble">Hey, I'm Lumi!</div>
                            </div>
                            <button class="lumi-continue-btn" onclick="goToIntro2()">Continue</button>
                        </div>
                    </div>`;
            }

            // INTRO 2 — only for new users
            else if (state.currentView === 'lumi_intro2') {
                app.innerHTML = `
                    <div class="lumi-intro-screen">
                        <div class="lumi-intro-inner">
                            <div class="lumi-center">
                                <img class="lumi-mascot-img"
                                    src="default.png"
                                    onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712109.png'">
                                <div class="speech-bubble-wide">
                                    I'm here to help you focus. Remember — if you think it's yours, then it's yours.
                                </div>
                            </div>
                            <button class="lumi-continue-btn" onclick="goToName()">Continue</button>
                        </div>
                    </div>`;
            }

            // NAME ENTRY
            else if (state.currentView === 'name') {
                app.innerHTML = `
                    <div class="top-content">
                        <h1 class="main-greeting">Assalamu Alaikum!</h1>
                        <p class="sub-greeting">What should I call you?</p>
                        <div class="input-group">
                            <input type="text" id="nameInput" placeholder="Name..." autocomplete="off">
                            <button class="btn-go" onclick="saveName()">→</button>
                        </div>
                    </div>
                    <div class="bottom-area">
                        <div class="mascot-circle">
                            <img src="default.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                    </div>`;
                setTimeout(() => {
                    const input = document.getElementById('nameInput');
                    if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });
                }, 50);
            }

            // DREAM ENTRY
            else if (state.currentView === 'dream') {
                app.innerHTML = `
                    <div class="top-content">
                        <h1 class="main-greeting">Welcome, ${state.name}.</h1>
                        <p class="sub-greeting">What is already yours?</p>
                        <div class="input-group">
                            <input type="text" id="dreamInput" placeholder="Your dream..." autocomplete="off">
                            <button class="btn-go" onclick="saveDream()">→</button>
                        </div>
                    </div>
                    <div class="bottom-area">
                        <div class="mascot-circle">
                            <img src="typing.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                    </div>`;
                setTimeout(() => {
                    const input = document.getElementById('dreamInput');
                    if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') saveDream(); });
                }, 50);
            }

            // SANCTUARY
            else {
                app.innerHTML = `
                    <div class="top-content">
                        <h1 class="main-greeting" style="font-style: italic;">It is yours.</h1>
                        <p class="sub-greeting" style="color: var(--accent); font-weight: bold; font-size: 24px;">"${state.dream}"</p>
                    </div>
                    <div class="bottom-area">
                        <div class="mascot-circle" style="margin-bottom: 20px;">
                            <img src="success.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                        <p style="text-align: center; opacity: 0.8; font-family: sans-serif;">
                            Focus only on it <b>happening</b>.
                        </p>
                    </div>`;
            }
        }

        render();
    </script>
</body>
</html>
