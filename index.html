<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        #app {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; max-width: 400px;
            padding: 50px 25px; box-sizing: border-box;
            justify-content: space-between;
        }

        /* Top Section */
        .top-content { width: 100%; text-align: left; }
        .main-greeting { font-size: 34px; font-weight: bold; margin: 0 0 10px 0; }
        .sub-greeting { font-size: 18px; opacity: 0.8; margin: 0 0 35px 0; font-family: sans-serif; }

        /* Input Bar */
        .input-group { position: relative; width: 100%; }
        input {
            width: 100%; padding: 18px; padding-right: 60px;
            border-radius: 18px; border: none;
            background-color: var(--mocha-darker);
            color: var(--text-color);
            font-size: 22px; font-weight: bold;
            box-sizing: border-box; outline: none;
        }
        .btn-go {
            position: absolute; right: 8px; top: 50%;
            transform: translateY(-50%);
            background-color: #F5F5F0; border: none;
            width: 45px; height: 45px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 20px; font-weight: bold;
        }

        /* Bottom / Mascot */
        .bottom-area {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; margin-bottom: 40px;
        }
        .mascot-circle {
            width: 130px; height: 130px; border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center;
        }
        .mascot-circle img { width: 80%; height: 80%; object-fit: contain; }

        /* PERSIST screen */
        .persist-screen {
            height: 100%; width: 100%; display: flex;
            justify-content: center; align-items: center;
            font-size: 40px; letter-spacing: 4px;
        }

        /* LUMI INTRO screen */
        .lumi-intro-screen {
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 28px;
            animation: fadeIn 0.6s ease;
        }
        .lumi-intro-screen .mascot-circle {
            width: 150px; height: 150px;
            border-width: 2px;
            animation: lumiPulse 2s ease-in-out infinite;
        }
        .lumi-intro-screen .mascot-circle img {
            width: 80%; height: 80%; object-fit: contain;
        }
        .lumi-intro-text {
            text-align: center;
            animation: slideUp 0.7s ease 0.2s both;
        }
        .lumi-intro-text h2 {
            font-size: 28px; margin: 0 0 10px 0;
        }
        .lumi-intro-text p {
            font-size: 16px; opacity: 0.7;
            font-family: sans-serif; margin: 0;
        }
        .lumi-intro-btn {
            background-color: var(--accent);
            color: var(--mocha-darker);
            border: none; border-radius: 14px;
            padding: 16px 40px;
            font-size: 18px; font-weight: bold;
            cursor: pointer;
            font-family: 'Times New Roman', serif;
            animation: slideUp 0.7s ease 0.4s both;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes lumiPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 163, 115, 0.3); }
            50%       { box-shadow: 0 0 0 14px rgba(212, 163, 115, 0); }
        }

        .reset-btn {
            position: fixed; bottom: 10px; left: 10px;
            background: none; border: none; color: gray;
            font-size: 10px; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <button class="reset-btn" onclick="resetApp()">RESET DATA</button>
    <div id="app"></div>

    <script>
        let state = {
            name:  localStorage.getItem('lumi_name')  || '',
            dream: localStorage.getItem('lumi_dream') || '',
            currentView: 'persist'
        };

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        function saveName() {
            const val = document.getElementById('nameInput').value;
            if (val.trim()) {
                state.name = val.trim();
                localStorage.setItem('lumi_name', state.name);
                state.currentView = 'dream';
                render();
            }
        }

        function saveDream() {
            const val = document.getElementById('dreamInput').value;
            if (val.trim()) {
                state.dream = val.trim();
                localStorage.setItem('lumi_dream', state.dream);
                state.currentView = 'sanctuary';
                render();
            }
        }

        function render() {
            const app = document.getElementById('app');

            // VIEW 1: PERSIST SCREEN
            if (state.currentView === 'persist') {
                app.innerHTML = `<div class="persist-screen">PERSIST</div>`;
                setTimeout(() => {
                    // After PERSIST, decide where to go
                    if (!state.name) {
                        // New user — show Lumi intro first
                        state.currentView = 'lumi_intro';
                    } else if (!state.dream) {
                        state.currentView = 'dream';
                    } else {
                        state.currentView = 'sanctuary';
                    }
                    render();
                }, 2000);
            }

            // VIEW 2: LUMI INTRO (only shown when name not set yet)
            else if (state.currentView === 'lumi_intro') {
                app.innerHTML = `
                    <div class="lumi-intro-screen">
                        <div class="mascot-circle">
                            <img src="mascot.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                        <div class="lumi-intro-text">
                            <h2>Hi, I'm Lumi ✨</h2>
                            <p>Your personal sanctuary awaits.<br>Let's build it together.</p>
                        </div>
                        <button class="lumi-intro-btn" onclick="goToName()">Begin →</button>
                    </div>`;
            }

            // VIEW 3: NAME ENTRY
            else if (state.currentView === 'name') {
                app.innerHTML = `
                    <div class="top-content">
                        <h1 class="main-greeting">Assalamu Alaikum!</h1>
                        <p class="sub-greeting">What should I call you?</p>
                        <div class="input-group">
                            <input type="text" id="nameInput" placeholder="Name..." autocomplete="off">
                            <button class="btn-go" onclick="saveName()">→</button>
                        </div>
                    </div>
                    <div class="bottom-area">
                        <div class="mascot-circle">
                            <img src="mascot.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                    </div>`;

                // Allow Enter key
                setTimeout(() => {
                    const input = document.getElementById('nameInput');
                    if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });
                }, 50);
            }

            // VIEW 4: DREAM ENTRY
            else if (state.currentView === 'dream') {
                app.innerHTML = `
                    <div class="top-content">
                        <h1 class="main-greeting">Welcome, ${state.name}.</h1>
                        <p class="sub-greeting">What is already yours?</p>
                        <div class="input-group">
                            <input type="text" id="dreamInput" placeholder="Your dream..." autocomplete="off">
                            <button class="btn-go" onclick="saveDream()">→</button>
                        </div>
                    </div>
                    <div class="bottom-area">
                        <div class="mascot-circle">
                            <img src="typing.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                    </div>`;

                setTimeout(() => {
                    const input = document.getElementById('dreamInput');
                    if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') saveDream(); });
                }, 50);
            }

            // VIEW 5: SANCTUARY
            else {
                app.innerHTML = `
                    <div class="top-content">
                        <h1 class="main-greeting" style="font-style: italic;">It is yours.</h1>
                        <p class="sub-greeting" style="color: var(--accent); font-weight: bold; font-size: 24px;">"${state.dream}"</p>
                    </div>
                    <div class="bottom-area">
                        <div class="mascot-circle" style="margin-bottom: 20px;">
                            <img src="success.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2675/2675962.png'">
                        </div>
                        <p style="text-align: center; opacity: 0.8; font-family: sans-serif;">
                            Focus only on it <b>happening</b>.
                        </p>
                    </div>`;
            }
        }

        function goToName() {
            state.currentView = 'name';
            render();
        }

        render();
    </script>
</body>
</html>
