<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumiest Sanctuary</title>
    <style>
        :root {
            --mocha-bg: #3C2A21;
            --mocha-darker: #2D1F18;
            --text-color: #F5F5F0;
            --accent: #D4A373;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--mocha-bg);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        #app {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; max-width: 400px;
            padding: 40px 25px; box-sizing: border-box;
            justify-content: center;
        }

        /* INPUT SCREENS (Name/Age) */
        .q-top { width: 100%; text-align: left; }
        .q-question { font-size: 32px; font-weight: bold; margin: 0 0 10px 0; line-height: 1.2; }
        .q-sub { font-size: 16px; opacity: 0.65; margin: 0 0 40px 0; font-family: sans-serif; line-height: 1.4; }
        .name-input-row { display: flex; align-items: center; gap: 12px; border-bottom: 2px solid rgba(245, 240, 232, 0.25); padding-bottom: 10px; }
        .name-input-field, .age-input-field { flex: 1; background: none; border: none; outline: none; color: var(--text-color); font-size: 32px; font-weight: bold; font-family: 'Times New Roman', serif; padding: 0; caret-color: var(--accent); min-width: 0; }
        .name-arrow-btn { width: 52px; height: 52px; border-radius: 50%; background-color: rgba(245, 240, 232, 0.12); border: none; color: var(--text-color); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* IDENTITY OPTIONS */
        .identity-options { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .identity-option { width: 100%; padding: 18px 22px; border-radius: 16px; border: 2px solid rgba(212, 163, 115, 0.3); background: rgba(255,255,255,0.04); color: var(--text-color); font-size: 18px; font-weight: bold; font-family: 'Times New Roman', serif; cursor: pointer; text-align: left; box-sizing: border-box; }
        .identity-option.selected { background: rgba(212, 163, 115, 0.2); border-color: var(--accent); color: var(--accent); }

        /* BUTTONS */
        .q-next-btn { width: 70%; margin: 30px auto 0 auto; display: block; background-color: var(--accent); color: var(--mocha-darker); border: none; border-radius: 14px; padding: 14px 0; font-size: 13px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; font-family: 'Times New Roman', serif; box-shadow: 0 4px 0 #a87a50; opacity: 0.3; pointer-events: none; }
        .q-next-btn.active { opacity: 1; pointer-events: all; }

        /* COMPACT CARD & LUMI PLACEMENT */
        .card-wrapper { position: relative; width: 100%; margin: 0 auto; }
        .mascot-overlap {
            width: 130px; height: 130px; 
            object-fit: contain; display: block; margin: 0 auto;
            position: relative; z-index: 2; margin-bottom: -65px; /* Lumi sits on the edge */
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }
        .compact-card {
            background-color: var(--mocha-darker); border-radius: 24px;
            padding: 75px 22px 22px 22px; /* Tightened internal space */
            width: 100%; box-sizing: border-box; position: relative; z-index: 1;
        }

        /* DREAM & SUPPORT SPECIFICS */
        .dream-title, .support-title { font-size: 18px; font-weight: bold; font-style: italic; line-height: 1.4; text-align: center; margin: 0 0 10px 0; }
        .dream-input-field { width: 100%; background: none; border: none; border-bottom: 1px solid rgba(245,240,232,0.2); outline: none; color: var(--text-color); font-size: 16px; font-family: 'Times New Roman', serif; font-style: italic; padding: 8px 0; box-sizing: border-box; }
        .support-option { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1.5px solid rgba(212, 163, 115, 0.2); background: rgba(255,255,255,0.03); color: var(--text-color); margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .support-option.selected { background: rgba(212, 163, 115, 0.18); border-color: var(--accent); }

        /* SANCTUARY FINAL VIEW */
        .sanctuary-page { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; }
        .sanctuary-card { background-color: var(--mocha-darker); border-radius: 24px; padding: 35px 25px; width: 100%; box-sizing: border-box; }
        .sanctuary-main { font-size: 20px; font-weight: bold; font-style: italic; margin-bottom: 15px; }
        .sanctuary-dream { font-size: 17px; color: var(--accent); font-style: italic; margin: 10px 0; }
        .sanctuary-sub { font-size: 13px; opacity: 0.5; margin-top: 15px; }

        /* INTRO SCREENS */
        .lumi-intro-screen { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .speech-bubble-wide { position: absolute; bottom: 165px; left: 10px; right: 0; background-color: #F5F0E8; border-radius: 20px; padding: 16px; font-size: 15px; color: #3C2A21; font-weight: bold; box-shadow: 0 4px 16px rgba(0,0,0,0.3); opacity: 0; animation: bubbleIn 0.5s ease 0.3s forwards; }
        @keyframes bubbleIn { 0% { opacity: 0; transform: translateY(14px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        let state = {
            name: localStorage.getItem('lumi_name') || '',
            age: localStorage.getItem('lumi_age') || '',
            identity: localStorage.getItem('lumi_identity') || '',
            dream: localStorage.getItem('lumi_dream') || '',
            support: localStorage.getItem('lumi_support') || '',
            currentView: 'persist'
        };

        function resetApp() { localStorage.clear(); location.reload(); }

        function render() {
            const app = document.getElementById('app');

            if (state.currentView === 'persist') {
                app.innerHTML = `<div style="font-size:40px; text-align:center;">PERSIST</div>`;
                setTimeout(() => { 
                    if (!state.name) state.currentView = 'lumi_intro1';
                    else if (!state.age) state.currentView = 'age';
                    else if (!state.identity) state.currentView = 'identity';
                    else if (!state.dream) state.currentView = 'dream';
                    else if (!state.support) state.currentView = 'support';
                    else state.currentView = 'sanctuary';
                    render(); 
                }, 1000);
            }

            else if (state.currentView === 'lumi_intro1') {
                app.innerHTML = `<div class="lumi-intro-screen"><div><button class="q-next-btn active" onclick="state.currentView='name';render()">Continue</button></div></div>`;
            }

            else if (state.currentView === 'name') {
                app.innerHTML = `<div class="q-top"><h1 class="q-question">Who are you?</h1><div class="name-input-row"><input type="text" id="nameInput" class="name-input-field" placeholder="Name..."><button class="name-arrow-btn" onclick="state.name=document.getElementById('nameInput').value;localStorage.setItem('lumi_name',state.name);state.currentView='age';render()">→</button></div></div>`;
            }

            else if (state.currentView === 'age') {
                app.innerHTML = `<div class="q-top"><h1 class="q-question">Age?</h1><div class="name-input-row"><input type="number" id="ageInput" class="age-input-field" placeholder="Age..."><button class="name-arrow-btn" onclick="state.age=document.getElementById('ageInput').value;localStorage.setItem('lumi_age',state.age);state.currentView='identity';render()">→</button></div></div>`;
            }

            else if (state.currentView === 'identity') {
                app.innerHTML = `<div class="q-top"><h1 class="q-question">Identity?</h1><div class="identity-options"><button class="identity-option" onclick="state.identity='Male';localStorage.setItem('lumi_identity','Male');state.currentView='dream';render()">👦 Male</button><button class="identity-option" onclick="state.identity='Female';localStorage.setItem('lumi_identity','Female');state.currentView='dream';render()">👧 Female</button></div></div>`;
            }

            else if (state.currentView === 'dream') {
                app.innerHTML = `
                    <div class="card-wrapper">
                        <img class="mascot-overlap" src="typing.png">
                        <div class="compact-card">
                            <p class="dream-title">Nice to meet you, ${state.name}.<br>What is one dream you'd like to focus on first?</p>
                            <input type="text" id="dreamInput" class="dream-input-field" placeholder="I am...">
                            <div style="margin-top:20px; text-align:center;">
                                <button class="q-next-btn active" onclick="state.dream=document.getElementById('dreamInput').value;localStorage.setItem('lumi_dream',state.dream);state.currentView='support';render()">Continue →</button>
                                <p onclick="state.dream='';localStorage.setItem('lumi_dream','');state.currentView='support';render()" style="cursor:pointer; opacity:0.5; font-size:12px;">skip for now</p>
                            </div>
                        </div>
                    </div>`;
            }

            else if (state.currentView === 'support') {
                app.innerHTML = `
                    <div class="card-wrapper">
                        <img class="mascot-overlap" src="default.png">
                        <div class="compact-card">
                            <p class="support-title">How can I best support you today?</p>
                            <button class="support-option" onclick="state.support='1';localStorage.setItem('lumi_support','1');state.currentView='sanctuary';render()">🌿 Keep me consistent</button>
                            <button class="support-option" onclick="state.support='2';localStorage.setItem('lumi_support','2');state.currentView='sanctuary';render()">✨ Help me see it clearly</button>
                        </div>
                    </div>`;
            }

            // FINAL PAGE LOGIC
            else if (state.currentView === 'sanctuary') {
                const hasDream = state.dream && state.dream.trim() !== "";
                app.innerHTML = `
                    <div class="sanctuary-page">
                        <img class="mascot-overlap" src="success.png" style="margin-bottom:-40px;">
                        <div class="sanctuary-card">
                            <p class="sanctuary-main">
                                ${hasDream 
                                    ? `Remember, ${state.name}:<br>if you think it's yours, it's yours.` 
                                    : `Remember, ${state.name}:<br>clarity is on its way.`}
                            </p>
                            ${hasDream ? `<p class="sanctuary-dream">"${state.dream}"</p>` : ''}
                            <p class="sanctuary-sub">Allah has already written it for you.</p>
                        </div>
                    </div>`;
            }
        }
        render();
    </script>
</body>
</html>
